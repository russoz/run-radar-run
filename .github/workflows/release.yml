name: Semantic Release

permissions: {}

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci-tests.yml
    permissions:
      contents: read

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry poethepoet
          poetry install --with dev

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: poe release

      - name: Build package
        run: poetry build

      - name: Check if dist folder has content
        id: check_dist
        run: |
          if [ -d dist ] && [ "$(ls -A dist)" ]; then
            echo "has_content=true" >> $GITHUB_OUTPUT
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
          fi

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        if: ${{ steps.check_dist.outputs.has_content == 'true' }}
        with:
          name: run-radar-run-distributions
          path: dist/
    outputs:
      has_content: ${{ steps.check_dist.outputs.has_content }}

  publish-to-pypi:
    needs:
      - build
    if: ${{ needs.build.outputs.has_content == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/run-radar-run
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: run-radar-run-distributions
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
